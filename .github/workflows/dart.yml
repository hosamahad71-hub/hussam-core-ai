name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: hussam-backup

      # خطوة أتمتة ذكية: فك ضغط ملف المشروع تلقائياً داخل السيرفر
      - name: Unzip project files
        run: |
          if [ -f hussam_ready.zip ]; then
            mkdir -p hussam-backup
            unzip -o hussam_ready.zip -d hussam-backup
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: hussam-backup
        run: flutter pub get

      - name: Analyze project source
        working-directory: hussam-backup
        run: flutter analyze
        Fix Flutter workflow path
